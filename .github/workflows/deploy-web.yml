name: Deploy Web Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

env:
  GODOT_VERSION: 4.6.1
  GODOT_RELEASE: 4.6.1-stable
  GODOT_TEMPLATE_DIR: 4.6.1.stable

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y wget unzip

      - name: Download Godot editor
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_linux.x86_64.zip" -O godot.zip
          unzip -q godot.zip -d "$HOME/godot"
          chmod +x "$HOME/godot/Godot_v${GODOT_RELEASE}_linux.x86_64"

      - name: Install export templates
        run: |
          mkdir -p "$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATE_DIR}"
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_export_templates.tpz" -O templates.tpz
          unzip -q templates.tpz -d "$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATE_DIR}"

      - name: Prepare export directory
        run: mkdir -p dist/web

      - name: Export Web build
        run: |
          "$HOME/godot/Godot_v${GODOT_RELEASE}_linux.x86_64" --headless --path . --export-release "Web" dist/web/index.html
          touch dist/web/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
